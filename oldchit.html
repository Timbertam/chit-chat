<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chit-Chat</title>
    <style>
.hover-container {
  position: relative;
  display: inline-block;
  cursor: pointer;
}

.thumbnail {
  display: none; /* Hide by default */
  position: absolute;
  top: 20px; /* Position it below the text */
  left: 0;
  z-index: 10;
}

.thumbnail img {
  width: 100px; /* Set thumbnail size */
  border: 1px solid #ccc;
}

/* Reveal the thumbnail when the container is hovered */
.hover-container:hover .thumbnail {
  display: block;
}
    </style>
</head>
<body>
    <table>
  <tr>
    <th>Name</th>
    <th>Background</th>
    <th>Song</th>
    <th>Origin</th>
  </tr>
    <div class="hover-container">
  <tr>
    <td>Day</td>
    <span class="thumbnail">
    <td>Back.png</td>
    <img src="/home/timbertam/1774816781_new_IMG_20260330_013841_455.jpg" alt="Thumbnail">
    </span>
    <td>Coso.mp3</td>
    <td>Sonic CD</td>
  </tr>
</div>
  <tr>
    <td>Centro comercial Moctezuma</td>
    <td>Francisco Chang</td>
    <td>Mexico</td>
    <td>Germany</td>
  </tr>
</table>
</body>
</html>
